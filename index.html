<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=yes">
  <meta name="theme-color" content="#173a3f">
  <title>金属材料学｜考前刷题本</title>
  <style>

    :root {
      --ink:#173a3f;
      --ink-2:#31545a;
      --coral:#ed6a52;
      --coral-dark:#c94d39;
      --cream:#f7f1e6;
      --paper:#fffdf8;
      --mint:#dceee8;
      --mint-2:#a9d2c4;
      --yellow:#f4ce73;
      --red:#b83a36;
      --line:#d9ded8;
      --muted:#65767a;
      --shadow:0 16px 44px rgba(31,57,57,.11);
      --radius:24px;
    }
    *{box-sizing:border-box}
    html{background:var(--cream);scroll-behavior:smooth}
    body{margin:0;color:var(--ink);background:
      radial-gradient(circle at 4% 0%,rgba(244,206,115,.24),transparent 28rem),
      radial-gradient(circle at 100% 18%,rgba(169,210,196,.28),transparent 30rem),var(--cream);
      font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Hiragino Sans GB","Microsoft YaHei",sans-serif;
      min-height:100vh;-webkit-tap-highlight-color:transparent}
    button,input,select,textarea{font:inherit;color:inherit}
    button{cursor:pointer}
    button:focus-visible,input:focus-visible,select:focus-visible,textarea:focus-visible{outline:3px solid rgba(237,106,82,.3);outline-offset:2px}
    .shell{width:min(1080px,calc(100% - 32px));margin:0 auto;padding:20px 0 112px}
    .topbar{display:flex;align-items:center;justify-content:space-between;gap:18px;margin-bottom:24px}
    .brand{display:flex;align-items:center;gap:12px;font-weight:900;letter-spacing:.02em}
    .brand-mark{width:44px;height:44px;border-radius:15px;background:var(--ink);color:white;display:grid;place-items:center;position:relative;box-shadow:0 10px 24px rgba(23,58,63,.18)}
    .brand-mark:after{content:"";width:12px;height:12px;border:3px solid var(--yellow);border-radius:50%;position:absolute;right:6px;bottom:6px}
    .brand small{display:block;color:var(--muted);font-weight:650;letter-spacing:0;margin-top:2px}
    .offline{display:inline-flex;align-items:center;gap:7px;background:rgba(255,255,255,.7);border:1px solid rgba(23,58,63,.1);padding:9px 12px;border-radius:999px;font-size:13px;font-weight:750;color:var(--ink-2)}
    .offline:before{content:"";width:8px;height:8px;border-radius:50%;background:#31a071;box-shadow:0 0 0 4px rgba(49,160,113,.13)}
    .panel{background:rgba(255,253,248,.93);border:1px solid rgba(23,58,63,.09);border-radius:var(--radius);box-shadow:var(--shadow)}
    .hero{display:grid;grid-template-columns:1.25fr .75fr;gap:22px;overflow:hidden;position:relative;padding:38px}
    .hero:after{content:"";position:absolute;width:260px;height:260px;border:62px solid rgba(244,206,115,.25);border-radius:50%;right:-102px;top:-104px;pointer-events:none}
    .eyebrow{text-transform:uppercase;letter-spacing:.15em;color:var(--coral-dark);font-size:12px;font-weight:900}
    h1{font-size:clamp(34px,5vw,64px);line-height:1.06;letter-spacing:-.055em;margin:13px 0 16px;max-width:760px}
    .hero p{font-size:17px;line-height:1.75;color:var(--ink-2);margin:0;max-width:680px}
    .hero-side{align-self:end;display:grid;grid-template-columns:1fr 1fr;gap:12px;z-index:1}
    .mini-stat{background:var(--ink);color:white;border-radius:20px;padding:18px;min-height:120px;display:flex;flex-direction:column;justify-content:space-between}
    .mini-stat:nth-child(2){background:var(--coral)}
    .mini-stat span{font-size:12px;font-weight:800;opacity:.8}
    .mini-stat strong{font-size:34px;line-height:1}
    .quick-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin:18px 0}
    .quick{min-height:108px;border:0;border-radius:22px;padding:18px;text-align:left;background:white;box-shadow:0 10px 25px rgba(42,67,67,.07);transition:.18s transform,.18s box-shadow}
    .quick:hover{transform:translateY(-2px);box-shadow:0 14px 32px rgba(42,67,67,.12)}
    .quick b{display:block;font-size:16px;margin:10px 0 4px}.quick small{color:var(--muted);line-height:1.4}.quick-icon{font-size:22px}
    .section-title{display:flex;align-items:end;justify-content:space-between;gap:18px;margin:30px 4px 14px}
    .section-title h2{font-size:24px;margin:0;letter-spacing:-.03em}.section-title p{margin:4px 0 0;color:var(--muted);font-size:14px}
    .setup{padding:24px}.setup-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:12px}
    label.field{display:grid;gap:7px;font-size:12px;font-weight:850;color:var(--muted)}
    select,input[type="search"]{width:100%;height:50px;border:1px solid var(--line);background:white;border-radius:14px;padding:0 13px}
    .primary{border:0;background:var(--coral);color:white;border-radius:15px;min-height:50px;font-weight:900;padding:0 20px;box-shadow:0 10px 22px rgba(237,106,82,.23)}
    .primary:hover{background:var(--coral-dark)}
    .secondary{border:1px solid rgba(23,58,63,.16);background:white;border-radius:15px;min-height:48px;font-weight:850;padding:0 17px}
    .ghost{border:0;background:transparent;min-height:44px;border-radius:13px;font-weight:800;color:var(--ink-2);padding:0 12px}
    .setup .primary{height:50px;align-self:end}
    .subject-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px}
    .subject-card{padding:23px;display:grid;grid-template-columns:1fr auto;gap:16px;align-items:center}
    .subject-card h3{font-size:22px;margin:0 0 7px}.subject-card p{margin:0;color:var(--muted);font-size:14px;line-height:1.55}
    .ring{--pct:0;width:82px;height:82px;border-radius:50%;display:grid;place-items:center;background:conic-gradient(var(--coral) calc(var(--pct)*1%),#e8e8e1 0);position:relative}
    .ring:before{content:"";width:62px;height:62px;border-radius:50%;background:var(--paper);position:absolute}.ring span{z-index:1;font-weight:900;font-size:14px}
    .bottom-nav{position:fixed;z-index:20;left:50%;bottom:max(14px,env(safe-area-inset-bottom));transform:translateX(-50%);width:min(620px,calc(100% - 26px));height:72px;background:rgba(23,58,63,.95);border:1px solid rgba(255,255,255,.12);box-shadow:0 18px 44px rgba(23,58,63,.28);border-radius:24px;display:grid;grid-template-columns:repeat(3,1fr);padding:7px;backdrop-filter:blur(14px)}
    .nav-btn{border:0;background:transparent;color:rgba(255,255,255,.68);border-radius:17px;font-weight:800;display:grid;place-items:center;gap:1px;font-size:12px}.nav-btn b{font-size:20px;font-weight:500}.nav-btn.active{background:white;color:var(--ink)}
    .session-mode .bottom-nav,.session-mode>.shell>.topbar{display:none}
    .session-mode .shell{padding-top:max(18px,env(safe-area-inset-top));padding-bottom:45px}
    .session-wrap{width:min(860px,100%);margin:0 auto}
    .session-head{display:grid;grid-template-columns:auto 1fr auto;align-items:center;gap:14px;margin:4px 0 18px}
    .round{width:48px;height:48px;border:1px solid rgba(23,58,63,.14);border-radius:16px;background:rgba(255,255,255,.75);font-size:22px}
    .progress-track{height:10px;border-radius:99px;background:rgba(23,58,63,.1);overflow:hidden}.progress-fill{height:100%;background:linear-gradient(90deg,var(--coral),var(--yellow));border-radius:inherit;transition:.3s width}
    .progress-label{font-size:12px;color:var(--muted);font-weight:800;margin-top:6px;text-align:center}
    .quiz-card{padding:clamp(24px,5vw,48px);min-height:610px;display:flex;flex-direction:column;position:relative;overflow:hidden}
    .quiz-card:before{content:"";width:150px;height:14px;border-radius:99px;background:var(--yellow);position:absolute;left:44px;top:-7px;transform:rotate(-2deg)}
    .meta-row{display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap}
    .chips{display:flex;gap:8px;flex-wrap:wrap}.chip{padding:7px 10px;border-radius:999px;background:var(--mint);font-size:12px;font-weight:850;color:var(--ink-2)}.chip.origin{background:#fff0cf;color:#875a00}
    .star{border:0;background:transparent;font-size:26px;width:48px;height:48px;border-radius:14px}.star.on{color:#e8a319}.star:hover{background:#f3f0e9}
    .question{font-size:clamp(23px,3.5vw,34px);line-height:1.46;letter-spacing:-.025em;margin:26px 0 24px;white-space:pre-wrap}
    .answer-input{width:100%;min-height:142px;border:1px solid var(--line);border-radius:18px;background:white;padding:17px 18px;font-size:17px;line-height:1.65;resize:vertical}
    .judge-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}.judge{height:70px;background:white;border:2px solid var(--line);border-radius:18px;font-size:20px;font-weight:900}.judge.selected{border-color:var(--coral);background:#fff1ed;color:var(--coral-dark)}
    .action-row{display:flex;gap:11px;flex-wrap:wrap;margin-top:16px}.action-row .primary{flex:1}.action-row .secondary{min-width:145px}
    .hint-box{margin-top:15px;padding:14px 16px;border:1px dashed #d5a83f;background:#fff7de;border-radius:15px;color:#745613;line-height:1.6}
    .answer-box{margin-top:20px;background:var(--ink);color:white;border-radius:21px;padding:22px;animation:rise .24s ease both}
    .answer-box .label{font-size:12px;text-transform:uppercase;letter-spacing:.12em;color:var(--mint-2);font-weight:900;margin-bottom:10px}
    .answer-text{font-size:16px;line-height:1.82;white-space:pre-wrap}.source-note{margin-top:16px;border-top:1px solid rgba(255,255,255,.16);padding-top:12px;color:#dce9e6;font-size:12px;line-height:1.6}
    .compare{margin-top:12px;background:rgba(255,255,255,.1);padding:13px;border-radius:14px;font-size:13px;line-height:1.55}
    .rating{margin-top:18px}.rating-label{font-size:13px;font-weight:850;color:var(--muted);margin-bottom:9px}.rating-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
    .rate{min-height:68px;border:1px solid var(--line);background:white;border-radius:17px;font-weight:900}.rate span{display:block;font-size:11px;color:var(--muted);font-weight:650;margin-top:3px}.rate.again:hover{border-color:#d65a50;background:#fff1ef}.rate.hard:hover{border-color:#d7a729;background:#fff8df}.rate.good:hover{border-color:#4a9e7f;background:#ebf7f2}
    .finish{text-align:center;justify-content:center;align-items:center}.finish .big{font-size:70px}.finish h2{font-size:34px;margin:12px 0 8px}.finish p{color:var(--muted);line-height:1.7}.finish-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;width:100%;margin:22px 0}.finish-stats div{background:white;border:1px solid var(--line);border-radius:17px;padding:16px}.finish-stats strong{display:block;font-size:27px}.finish-stats span{font-size:12px;color:var(--muted)}
    .library-tools{padding:18px;display:grid;grid-template-columns:2fr 1fr 1fr;gap:10px;position:sticky;top:10px;z-index:3}.library-list{display:grid;gap:11px;margin-top:14px}
    .library-card{border:0;text-align:left;padding:18px 20px;background:rgba(255,253,248,.94);border-radius:19px;box-shadow:0 8px 22px rgba(42,67,67,.06);display:grid;grid-template-columns:1fr auto;gap:14px}.library-card:hover{box-shadow:0 12px 30px rgba(42,67,67,.12)}.library-card h3{font-size:16px;line-height:1.55;margin:8px 0 0}.library-card small{color:var(--muted)}.library-card .badge{align-self:center;background:var(--mint);border-radius:999px;padding:7px 10px;font-size:11px;font-weight:850;white-space:nowrap}
    .report-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}.report-card{padding:20px}.report-card span{font-size:12px;color:var(--muted);font-weight:800}.report-card strong{font-size:32px;display:block;margin-top:10px}.bars{padding:24px;margin-top:14px}.bar-item{display:grid;grid-template-columns:150px 1fr 55px;align-items:center;gap:12px;margin:16px 0}.bar-item b{font-size:14px}.bar-bg{height:11px;background:#e6e8e2;border-radius:99px;overflow:hidden}.bar-bg i{display:block;height:100%;background:linear-gradient(90deg,var(--mint-2),var(--coral));border-radius:99px}.bar-item em{font-style:normal;font-size:12px;text-align:right;color:var(--muted)}
    .settings{padding:23px;margin-top:14px}.settings-actions{display:flex;flex-wrap:wrap;gap:10px}.danger{color:var(--red);border-color:rgba(184,58,54,.26)}
    .empty{text-align:center;padding:50px 18px;color:var(--muted)}
    .toast{position:fixed;z-index:99;left:50%;bottom:105px;transform:translate(-50%,20px);opacity:0;background:var(--ink);color:white;border-radius:14px;padding:12px 17px;font-weight:750;font-size:14px;transition:.22s;pointer-events:none;box-shadow:var(--shadow)}.toast.show{opacity:1;transform:translate(-50%,0)}
    .hidden{display:none!important}
    @keyframes rise{from{transform:translateY(8px);opacity:0}to{transform:none;opacity:1}}
    @media(max-width:820px){.hero{grid-template-columns:1fr;padding:28px}.hero-side{grid-template-columns:1fr 1fr}.quick-grid{grid-template-columns:1fr 1fr}.setup-grid{grid-template-columns:1fr 1fr}.setup .primary{grid-column:1/-1}.report-grid{grid-template-columns:1fr 1fr}}
    @media(max-width:600px){.shell{width:min(100% - 22px,1080px);padding-top:12px}.brand small,.offline span{display:none}.hero{padding:24px}.hero p{font-size:15px}.mini-stat{min-height:98px}.quick-grid{gap:10px}.quick{min-height:104px;padding:15px}.subject-grid{grid-template-columns:1fr}.setup-grid{grid-template-columns:1fr}.quiz-card{padding:24px 19px;min-height:calc(100vh - 105px)}.question{margin-top:20px}.rating-grid{grid-template-columns:1fr}.library-tools{grid-template-columns:1fr;position:static}.report-grid{grid-template-columns:1fr 1fr}.bar-item{grid-template-columns:105px 1fr 42px}.finish-stats{gap:7px}.session-head{gap:8px}.round{width:44px;height:44px}}
    @media(prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important;scroll-behavior:auto!important}}
  
    .subject-grid{grid-template-columns:1fr}
    .choice-list{display:grid;gap:11px}
    .choice-option{border:2px solid var(--line);background:white;border-radius:17px;min-height:60px;padding:14px 17px;text-align:left;font-weight:780;line-height:1.55}
    .choice-option.selected{border-color:var(--coral);background:#fff1ed;color:var(--coral-dark)}
    .choice-option.correct{border-color:#4a9e7f;background:#ebf7f2;color:#276b54}
    .choice-option.wrong{border-color:#d65a50;background:#fff1ef;color:#a43b34}
    .wide-progress{display:grid;grid-template-columns:1fr auto;gap:20px;align-items:center;padding:24px}
    .wide-progress h3{font-size:22px;margin:0 0 7px}.wide-progress p{color:var(--muted);margin:0;line-height:1.6}
    @media(max-width:600px){.wide-progress{grid-template-columns:1fr auto}.choice-option{min-height:56px}}
  </style>
</head>

  <div class="toast" id="toast"></div>
  <input class="hidden" id="importFile" type="file" accept="application/json" onchange="importProgress(event)">
  <script>
    const CARDS=[{"id":"metals-001","number":1,"subject":"metals","deck":"homework","chapter":"作业主观题 · 大题精简版","type":"essay","prompt":"简述铝硅系铸造铝合金的特点。","options":[],"answerKey":"","answer":"流动性好、比重小、收缩小，焊接性和耐蚀性优良；硅相硬，耐磨性好。铸态共晶硅多呈粗针片状，塑性较低，常需变质处理使硅相细化/球化，以提高强韧性。","source":"《金属材料学_大题精简版》","answerOrigin":"精简版答案","sourceNote":"已按你提供的精简版替换原大题，保留核心得分点，方便考前背诵。"},{"id":"metals-002","number":2,"subject":"metals","deck":"homework","chapter":"作业主观题 · 大题精简版","type":"essay","prompt":"简述钛合金分类及其性能特点。","options":[],"answerKey":"","answer":"钛合金按组织分α（TA）、β（TB）、α+β（TC）。α型高温性能、组织稳定和焊接性好，但常温强度、塑性较低；β型塑性加工性好，可热处理强化、强度高，但组织稳定性差、冶炼复杂；α+β型可热处理强化，常温强度高、中温耐热好，但焊接性较差。总体比强度高、耐蚀、耐热，但加工难、成本高。","source":"《金属材料学_大题精简版》","answerOrigin":"精简版答案","sourceNote":"已按你提供的精简版替换原大题，保留核心得分点，方便考前背诵。"},{"id":"metals-003","number":3,"subject":"metals","deck":"homework","chapter":"作业主观题 · 大题精简版","type":"essay","prompt":"大尺寸汽车钢板弹簧，在汽车行驶过程中承受各种应力的作用，其性能要求较高。工艺路线为：下料→热成型→热处理①、②→表面强化。 (1)选择60Si2Mn（合金弹簧钢）作为汽车钢板弹簧材料的依据。 (2)指出其工艺过程路线中应采用的热处理工艺及其目的和零件制成后的最终组织。 (3)要提高板簧疲劳寿命，在板簧生产工艺流程中应采取何种表面强化手段，为什么？","options":[],"answerKey":"","answer":"(1)60Si2Mn强度、弹性极限、屈服强度、淬透性和抗疲劳性高，适合大尺寸板簧承受交变载荷。 (2)淬火：获马氏体，提高强度硬度；中温回火：获高弹性和韧性；最终组织为回火屈氏体/托氏体。 (3)喷丸强化：产生表面残余压应力，抑制疲劳裂纹萌生和扩展，提高疲劳寿命。","source":"《金属材料学_大题精简版》","answerOrigin":"精简版答案","sourceNote":"已按你提供的精简版替换原大题，保留核心得分点，方便考前背诵。"},{"id":"metals-004","number":4,"subject":"metals","deck":"homework","chapter":"作业主观题 · 大题精简版","type":"essay","prompt":"某厂的汽车挡圈缺口冲模，原用T10A钢制造，寿命只有100～200次，失效方式是两侧刃口塑性流变；改用Cr12钢制造，制模时采用原钢料直接进行机械加工，寿命只有1～20次，失效方式为崩刃或折断；改用9SiCr或6CrW2Si钢制造，寿命提高到1000次以上。 (1)试分析T10A、Cr12模寿命低的原因。 (2)为什么用9SiCr或6CrW2Si钢制造能显著提高寿命？","options":[],"answerKey":"","answer":"(1)T10A淬透性、回火稳定性不足，强度/热硬性低，刃口易塑性流变；Cr12直接机加工未锻造，碳化物粗大不均，脆性大、韧性差，易崩刃折断。 (2)9SiCr/6CrW2Si为低合金刃具钢，碳化物细小均匀，淬透性、强度、韧性配合好，既抗变形又抗崩断，寿命提高。","source":"《金属材料学_大题精简版》","answerOrigin":"精简版答案","sourceNote":"已按你提供的精简版替换原大题，保留核心得分点，方便考前背诵。"},{"id":"metals-005","number":5,"subject":"metals","deck":"homework","chapter":"作业主观题 · 大题精简版","type":"essay","prompt":"为什么铸铁中球墨铸铁应用广泛？","options":[],"answerKey":"","answer":"球状石墨割裂作用小、应力集中低，使球墨铸铁强度、塑性、韧性接近钢；同时保留铸铁铸造性好、耐磨、减震、切削加工性好等优点，还可通过合金化/热处理调控基体组织，性能范围广、成本低，故应用广。","source":"《金属材料学_大题精简版》","answerOrigin":"精简版答案","sourceNote":"已按你提供的精简版替换原大题，保留核心得分点，方便考前背诵。"},{"id":"metals-006","number":6,"subject":"metals","deck":"homework","chapter":"作业主观题 · 大题精简版","type":"essay","prompt":"说明碳素工具钢的优缺点、用途及淬火方法。","options":[],"answerKey":"","answer":"优点：成本低、加工性好、热处理简单，淬后硬度/耐磨性高。 缺点：淬透性低，水/盐水淬易变形开裂，热硬性差，工作温度应\u003c200℃，只适合小尺寸（断面\u003c15mm）简单工具。 用途：低速刃具、量具、简单冷冲模。 淬火方法：过共析钢常用不完全淬火+低温回火。","source":"《金属材料学_大题精简版》","answerOrigin":"精简版答案","sourceNote":"已按你提供的精简版替换原大题，保留核心得分点，方便考前背诵。"},{"id":"metals-007","number":7,"subject":"metals","deck":"homework","chapter":"作业主观题 · 大题精简版","type":"essay","prompt":"简述冷作模具用钢的性能要求。冷作模具钢有哪些类型？","options":[],"answerKey":"","answer":"性能要求：高硬度、高耐磨性，高强度和足够韧性，淬透性好，淬火变形小，工艺性好。 类型：碳素工具钢、低合金工具钢、高/中铬模具钢、基体钢（可含高速钢类）。","source":"《金属材料学_大题精简版》","answerOrigin":"精简版答案","sourceNote":"已按你提供的精简版替换原大题，保留核心得分点，方便考前背诵。"},{"id":"metals-008","number":8,"subject":"metals","deck":"homework","chapter":"作业主观题 · 大题精简版","type":"essay","prompt":"为什么说钢中的S、P杂质元素在一般情况下总是有害的？","options":[],"answerKey":"","answer":"S易形成FeS低熔点共晶，热加工时沿晶熔化，引起热脆；P形成Fe₃P或在晶界偏聚，使钢冷脆、焊接性差，并促成第二类回火脆性和晶界脆断。所以一般应严格控制S、P含量。","source":"《金属材料学_大题精简版》","answerOrigin":"精简版答案","sourceNote":"已按你提供的精简版替换原大题，保留核心得分点，方便考前背诵。"},{"id":"metals-009","number":9,"subject":"metals","deck":"homework","chapter":"作业主观题 · 大题精简版","type":"essay","prompt":"钢的强化机制有哪些？为什么一般钢的强化工艺都采用淬火-回火？","options":[],"answerKey":"","answer":"强化机制：固溶强化、细晶强化、位错强化、第二相弥散/沉淀强化。 淬火获马氏体，产生过饱和固溶强化、高位错密度和细化组织；回火析出细小碳化物产生第二相强化，同时消除应力、降脆增韧。因此淬火+回火能获得强韧性配合，是常用综合强化工艺。","source":"《金属材料学_大题精简版》","answerOrigin":"精简版答案","sourceNote":"已按你提供的精简版替换原大题，保留核心得分点，方便考前背诵。"},{"id":"metals-010","number":10,"subject":"metals","deck":"homework","chapter":"作业主观题 · 大题精简版","type":"essay","prompt":"什么是低碳马氏体钢？低碳马氏体在力学性能和工艺性能上有哪些突出优点？","options":[],"answerKey":"","answer":"低碳马氏体钢是低碳钢/低合金钢经淬火+低温回火，以板条低碳马氏体为使用组织的钢。 优点：强度、韧性、塑性配合好，缺口和疲劳缺口敏感性低，冷脆倾向小；冷变形、焊接性能好，脱碳、淬火变形和开裂倾向小。","source":"《金属材料学_大题精简版》","answerOrigin":"精简版答案","sourceNote":"已按你提供的精简版替换原大题，保留核心得分点，方便考前背诵。"},{"id":"metals-011","number":11,"subject":"metals","deck":"homework","chapter":"作业主观题 · 大题精简版","type":"essay","prompt":"为什么滚动轴承钢的含C量均为高C？滚动轴承钢中常含有Cr/Si/Mn合金元素，各起什么作用？为什么Cr量限制在一定范围？","options":[],"answerKey":"","answer":"(1)高C可保证淬火后高硬度、高耐磨性、接触疲劳强度和尺寸稳定性。 (2)Cr形成碳化物，提高淬透性、耐磨性、组织均匀性和耐蚀性；Si、Mn提高淬透性/回火稳定性，Mn还能与S形成MnS减轻危害。 (3)Cr过低则淬透性、耐磨性不足；过高会使碳化物粗大、残奥增多，降低韧性和疲劳寿命，故需限量。","source":"《金属材料学_大题精简版》","answerOrigin":"精简版答案","sourceNote":"已按你提供的精简版替换原大题，保留核心得分点，方便考前背诵。"},{"id":"metals-012","number":12,"subject":"metals","deck":"homework","chapter":"作业主观题 · 大题精简版","type":"essay","prompt":"低碳钢08、10、20钢，数字代表什么？为什么低碳钢08、10、20钢一般不采用淬火工艺？","options":[],"answerKey":"","answer":"08、10、20表示平均含碳量的万分之几，即约0.08%、0.10%、0.20%。这类钢含碳量低，淬火后马氏体少、硬度提升小，且淬透性差，易变形开裂；主要用于冲压、焊接等要求塑韧性的零件，通常不单纯淬火，需高表面硬度时多用渗碳+淬火。","source":"《金属材料学_大题精简版》","answerOrigin":"精简版答案","sourceNote":"已按你提供的精简版替换原大题，保留核心得分点，方便考前背诵。"},{"id":"metals-013","number":13,"subject":"metals","deck":"stage","chapter":"阶段测验 · 单选题","type":"choice","prompt":"不锈钢中最重要的合金元素是( )。","options":[{"key":"A","text":"镍 (Ni)"},{"key":"B","text":"铬 (Cr)"},{"key":"C","text":"钼 (Mo)"}],"answerKey":"B","answer":"B. 铬 (Cr)","source":"《金属材料学复习题库_Word版》","answerOrigin":"资料原答"},{"id":"metals-014","number":14,"subject":"metals","deck":"stage","chapter":"阶段测验 · 单选题","type":"choice","prompt":"奥氏体不锈钢晶间腐蚀的敏化温度区间通常为( )。","options":[{"key":"A","text":"250-450℃"},{"key":"B","text":"450-850℃"},{"key":"C","text":"850-1100℃"}],"answerKey":"B","answer":"B. 450-850℃","source":"《金属材料学复习题库_Word版》","answerOrigin":"资料原答"},{"id":"metals-015","number":15,"subject":"metals","deck":"stage","chapter":"阶段测验 · 单选题","type":"choice","prompt":"下列哪种不锈钢具有磁性( )。","options":[{"key":"A","text":"304不锈钢"},{"key":"B","text":"316不锈钢"},{"key":"C","text":"430不锈钢"}],"answerKey":"C","answer":"C. 430不锈钢","source":"《金属材料学复习题库_Word版     function norm(v){return String(v??'').toLowerCase().replace(/[\s，。；、,.：:（）()“”'"<>≥≤→—-]/g,'')}
    function shuffle(a){for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]]}return a}
    function stats(cards=CARDS){let seen=0,mastered=0,wrong=0,starred=0;cards.forEach(c=>{const p=saved.progress[c.id];if(!p)return;if(p.seen)seen++;if(p.level>=2)mastered++;if(p.wrong>p.right||p.level===0&&p.wrong)wrong++;if(p.starred)starred++});return{total:cards.length,seen,mastered,wrong,starred,pct:Math.round(mastered/cards.length*100)||0}}
    function toast(msg){const e=document.getElementById('toast');e.textContent=msg;e.classList.add('show');clearTimeout(toast.t);toast.t=setTimeout(()=>e.classList.remove('show'),2000)}
    function goTab(next){tab=next;document.body.classList.remove('session-mode');document.querySelectorAll('.nav-btn').forEach(b=>b.classList.toggle('active',b.dataset.tab===tab));render();scrollTo(0,0)}
    function render(){document.getElementById('app').innerHTML=tab==='home'?homeView():tab==='library'?libraryView():tab==='report'?reportView():sessionView()}

    function homeView(){const s=stats();return `<section class="panel hero"><div><div class="eyebrow">METALLIC MATERIALS · 主动回忆</div><h1>金属材料学，<br>单独练到会。</h1><p>共122题：12道主观题、60道选择题、10道填空题、40道判断题。先自己作答，再对照答案自评，错题会自动回炉。</p></div><div class="hero-side"><div class="mini-stat"><span>题库总量</span><strong>122</strong></div><div class="mini-stat"><span>已经掌握</span><strong>${s.mastered}</strong></div></div></section>
      <div class="quick-grid"><button class="quick" onclick="quickStart('all','objective','random',20)"><span class="quick-icon">⚡</span><b>客观题冲刺</b><small>随机20题，选择、填空与判断混合</small></button><button class="quick" onclick="quickStart('midterm','all','random',20)"><span class="quick-icon">◇</span><b>期中考试20题</b><small>从期中考试题库随机抽取</small></button><button class="quick" onclick="quickStart('all','all','wrong',20)"><span class="quick-icon">↻</span><b>再练错题</b><small>${s.wrong}题待巩固</small></button><button class="quick" onclick="quickStart('all','all','unseen',20)"><span class="quick-icon">✦</span><b>学习新题</b><small>${s.total-s.seen}题尚未见过</small></button></div>
      <div class="section-title"><div><h2>定制一组练习</h2><p>按来源、题型和章节筛选</p></div></div><section class="panel setup"><div class="setup-grid">${setupControls()}<button class="primary" onclick="startConfigured()">开始刷题 →</button></div></section>
      <div class="section-title"><div><h2>学习进度</h2><p>选择“掌握”后计入进度</p></div></div><section class="panel wide-progress"><div><h3>金属材料学</h3><p>已学习 ${s.seen}/${s.total} · 已掌握 ${s.mastered} · 待巩固 ${s.wrong}</p></div><div class="ring" style="--pct:${s.pct}"><span>${s.pct}%</span></div></section>`}
    function setupControls(){let pool=CARDS.filter(c=>(setup.deck==='all'||c.deck===setup.deck)&&(setup.type==='all'||(setup.type==='objective'?c.type!=='essay':c.type===setup.type)));const chapters=[...new Set(pool.map(c=>c.chapter))];return `<label class="field">题库<select onchange="updateSetup('deck',this.value)"><option value="all">全部题库</option>${Object.entries(DECK_LABEL).filter(([v])=>v!=='mixed').map(([v,t])=>`<option value="${v}" ${setup.deck===v?'selected':''}>${t}</option>`).join('')}</select></label><label class="field">题型<select onchange="updateSetup('type',this.value)"><option value="all">全部题型</option><option value="objective" ${setup.type==='objective'?'selected':''}>全部客观题</option>${Object.entries(TYPE_LABEL).map(([v,t])=>`<option value="${v}" ${setup.type===v?'selected':''}>${t}</option>`).join('')}</select></label><label class="field">章节<select onchange="updateSetup('chapter',this.value)"><option value="all">全部章节</option>${chapters.map(v=>`<option value="${esc(v)}" ${setup.chapter===v?'selected':''}>${esc(v)}</option>`).join('')}</select></label><label class="field">练习方式<select onchange="updateSetup('mode',this.value)"><option value="random">随机练习</option><option value="unseen" ${setup.mode==='unseen'?'selected':''}>只学新题</option><option value="wrong" ${setup.mode==='wrong'?'selected':''}>只练错题</option><option value="due" ${setup.mode==='due'?'selected':''}>到期复习</option><option value="starred" ${setup.mode==='starred'?'selected':''}>我的收藏</option><option value="sequential" ${setup.mode==='sequential'?'selected':''}>按题号顺序</option></select></label><label class="field">题量<select onchange="updateSetup('count',this.value)">${[10,20,50].map(n=>`<option value="${n}" ${setup.count==n?'selected':''}>${n}题</option>`).join('')}<option value="all">全部</option></select></label>`}
    function updateSetup(k,v){setup[k]=v;if(k==='deck'||k==='type')setup.chapter='all';render()}
    function quickStart(deck,type,mode,count){setup={deck,type,chapter:'all',mode,count:String(count)};startConfigured()}
    function filteredPool(){let pool=CARDS.filter(c=>(setup.deck==='all'||c.deck===setup.deck)&&(setup.type==='all'||(setup.type==='objective'?c.type!=='essay':c.type===setup.type))&&(setup.chapter==='all'||c.chapter===setup.chapter));const now=Date.now();if(setup.mode==='unseen')pool=pool.filter(c=>!saved.progress[c.id]?.seen);if(setup.mode==='wrong')pool=pool.filter(c=>{const p=saved.progress[c.id];return p&&(p.wrong>p.right||p.level===0&&p.wrong)});if(setup.mode==='due')pool=pool.filter(c=>{const p=saved.progress[c.id];return p&&p.seen&&p.due<=now});if(setup.mode==='starred')pool=pool.filter(c=>saved.progress[c.id]?.starred);if(setup.mode!=='sequential')shuffle(pool);return pool}
    function startConfigured(){let pool=filteredPool();const n=setup.count==='all'?pool.length:Number(setup.count);pool=pool.slice(0,n);if(!pool.length){toast('当前条件下没有题');return}beginSession(pool)}
    function beginSession(pool){session=[...pool];cursor=0;revealed=false;hintShown=false;typed='';picked='';finished=false;result={again:0,hard:0,good:0};tab='session';document.body.classList.add('session-mode');render();scrollTo(0,0)}
    function current(){return session[cursor]}
    function exitSession(){if(confirm('退出本组练习？已完成的进度会保留。'))goTab('home')}

    function answerInput(c){if(c.type==='choice')return `<div class="choice-list">${c.options.map(o=>{let cls=picked===o.key?'selected':'';if(revealed&&o.key===c.answerKey)cls+=' correct';else if(revealed&&picked===o.key&&picked!==c.answerKey)cls+=' wrong';return `<button class="choice-option ${cls}" onclick="pick('${o.key}')"><b>${o.key}.</b> ${esc(o.text)}</button>`}).join('')}</div>`;if(c.type==='judge')return `<div class="judge-row"><button class="judge ${picked==='对'?'selected':''}" onclick="pick('对')">✓ 对</button><button class="judge ${picked==='错'?'selected':''}" onclick="pick('错')">✕ 错</button></div>`;return `<textarea class="answer-input" id="answerInput" oninput="typed=this.value" placeholder="先凭记忆写下关键词，再看答案。">${esc(typed)}</textarea>`}
    function sessionView(){if(finished)return finishView();const c=current(),p=prog(c.id),pct=Math.round(cursor/session.length*100);return `<div class="session-wrap"><div class="session-head"><button class="round" onclick="exitSession()">×</button><div><div class="progress-track"><div class="progress-fill" style="width:${pct}%"></div></div><div class="progress-label">第 ${cursor+1}/${session.length} 题</div></div><button class="round" onclick="toggleStar('${c.id}')">${p.starred?'★':'☆'}</button></div><section class="panel quiz-card"><div class="meta-row"><div class="chips"><span class="chip">${esc(DECK_LABEL[c.deck])}</span><span class="chip">${esc(TYPE_LABEL[c.type])}</span><span class="chip origin">${esc(c.answerOrigin)}</span></div><button class="star ${p.starred?'on':''}" onclick="toggleStar('${c.id}')">${p.starred?'★':'☆'}</button></div><div class="question">${c.number}. ${esc(c.prompt)}</div>${answerInput(c)}${hintShown&&!revealed?`<div class="hint-box"><b>提示：</b>${esc(makeHint(c.answer))}</div>`:''}${!revealed?`<div class="action-row"><button class="secondary" onclick="hintShown=true;render()">给一点提示</button><button class="primary" onclick="reveal()">显示答案</button></div>`:answerArea(c)}</section></div>`}
    function pick(v){if(!revealed){picked=v;render()}}
    function makeHint(a){const parts=a.split(/[；\n]/).filter(Boolean);if(parts.length>1)return `答案包含${parts.length}个要点：`+parts.slice(0,4).map(x=>x.slice(0,5)+'…').join(' / ');const s=a.replace(/\s/g,'');return s.length<8?`${s[0]}${'·'.repeat(Math.max(1,s.length-2))}${s.at(-1)}`:`开头是“${s.slice(0,5)}…”，约${s.length}字。`}
    function reveal(){const c=current(),p=prog(c.id);typed=document.getElementById('answerInput')?.value??typed;p.seen++;p.lastSeen=Date.now();revealed=true;persist();render();setTimeout(()=>document.querySelector('.answer-box')?.scrollIntoView({behavior:'smooth',block:'nearest'}),40)}
    function comparison(c){if(c.type==='choice'&&picked)return `<div class="compare">${picked===c.answerKey?'✓ 选择正确':'✕ 你的选择与参考答案不同'}</div>`;if(c.type==='judge'&&picked)return `<div class="compare">${norm(c.answer).startsWith(norm(picked))?'✓ 判断正确':'✕ 你的判断与参考答案不同'}</div>`;if(c.type==='essay')return typed.trim()?`<div class="compare">你写了${typed.trim().length}字。主观题请按要点自评。</div>`:'';if(typed.trim()){const ok=norm(c.answer).includes(norm(typed))||norm(typed).includes(norm(c.answer));return `<div class="compare">${ok?'✓ 与参考答案基本匹配':'请对照参考答案后自评'}</div>`}return ''}
    function answerArea(c){return `<div class="answer-box"><div class="label">参考答案</div><div class="answer-text">${esc(c.answer)}</div>${comparison(c)}<div class="source-note">来源：${esc(c.source)}${c.sourceNote?`<br>${esc(c.sourceNote)}`:''}</div></div><div class="rating"><div class="rating-label">对照后自评：</div><div class="rating-grid"><button class="rate again" onclick="rate('again')">忘了<span>本组稍后再来</span></button><button class="rate hard" onclick="rate('hard')">模糊<span>明天重点复习</span></button><button class="rate good" onclick="rate('good')">掌握<span>延长复习间隔</span></button></div></div>`}
    function rate(kind){const c=current(),p=prog(c.id),now=Date.now();result[kind]++;if(kind==='again'){p.wrong++;p.level=0;p.due=now;if(session.length<80)session.splice(Math.min(cursor+3,session.length),0,c)}if(kind==='hard'){p.wrong++;p.level=Math.max(1,p.level);p.due=now+DAY}if(kind==='good'){p.right++;p.level=Math.min(3,Math.max(2,p.level+1));p.due=now+DAY*(p.level===3?7:3)}persist();cursor++;revealed=false;hintShown=false;typed='';picked='';if(cursor>=session.length)finished=true;render();scrollTo(0,0)}
    function toggleStar(id){const p=prog(id);p.starred=!p.starred;persist();render();toast(p.starred?'已收藏':'已取消收藏')}
    function finishView(){return `<div class="session-wrap"><section class="panel quiz-card finish"><div class="big">✓</div><div class="eyebrow">SESSION COMPLETE</div><h2>这一组练完了</h2><p>模糊和忘记的题已进入后续复习。</p><div class="finish-stats"><div><strong>${result.good}</strong><span>掌握</span></div><div><strong>${result.hard}</strong><span>模糊</span></div><div><strong>${result.again}</strong><span>忘了</span></div></div><div class="action-row" style="width:100%"><button class="secondary" onclick="goTab('report')">看学习报告</button><button class="primary" onclick="goTab('home')">回到首页</button></div></section></div>`}

    function libraryView(){let pool=CARDS.filter(c=>(library.deck==='all'||c.deck===library.deck)&&(library.type==='all'||c.type===library.type));const q=norm(library.query);if(q)pool=pool.filter(c=>norm(c.prompt+c.answer+c.chapter+c.options.map(o=>o.text).join('')).includes(q));return `<div class="section-title"><div><h2>题库</h2><p>搜索题干、答案、选项或章节</p></div><b>${pool.length}题</b></div><section class="panel library-tools"><input type="search" value="${esc(library.query)}" oninput="library.query=this.value;deferLibrary()" placeholder="搜索：如‘淬透性’‘不锈钢’"><select onchange="library.deck=this.value;render()"><option value="all">全部题库</option>${Object.entries(DECK_LABEL).filter(([v])=>v!=='mixed').map(([v,t])=>`<option value="${v}" ${library.deck===v?'selected':''}>${t}</option>`).join('')}</select><select onchange="library.type=this.value;render()"><option value="all">全部题型</option>${Object.entries(TYPE_LABEL).map(([v,t])=>`<option value="${v}" ${library.type===v?'selected':''}>${t}</option>`).join('')}</select></section><div class="library-list">${pool.length?pool.slice(0,140).map(libraryCard).join(''):'<div class="empty">没有找到匹配题目</div>'}</div>`}
    function deferLibrary(){clearTimeout(deferLibrary.t);deferLibrary.t=setTimeout(render,120)}
    function libraryCard(c){const p=saved.progress[c.id]||{};return `<button class="library-card" onclick="beginSession([CARDS.find(x=>x.id==='${c.id}')])"><div><small>${esc(DECK_LABEL[c.deck])} · ${esc(c.chapter)}</small><h3>${c.number}. ${esc(c.prompt)}</h3></div><span class="badge">${p.level>=2?'已掌握':p.seen?'待巩固':'新题'}${p.starred?' ★':''}</span></button>`}
    function reportView(){const s=stats(),difficult=CARDS.filter(c=>saved.progress[c.id]?.wrong).sort((a,b)=>(saved.progress[b.id].wrong-saved.progress[b.id].right)-(saved.progress[a.id].wrong-saved.progress[a.id].right)).slice(0,8);return `<div class="section-title"><div><h2>学习报告</h2><p>记录保存在当前浏览器，换设备前可导出</p></div></div><div class="report-grid"><section class="panel report-card"><span>已经学习</span><strong>${s.seen}</strong></section><section class="panel report-card"><span>已经掌握</span><strong>${s.mastered}</strong></section><section class="panel report-card"><span>待巩固</span><strong>${s.wrong}</strong></section><section class="panel report-card"><span>收藏</span><strong>${s.starred}</strong></section></div><section class="panel bars"><h3>总掌握度</h3>${progressBar('金属材料学',s)}</section><div class="section-title"><div><h2>最需要回炉的题</h2></div></div><div class="library-list">${difficult.length?difficult.map(libraryCard).join(''):'<div class="empty">还没有错题记录。</div>'}</div><section class="panel settings"><h3>学习记录</h3><div class="settings-actions"><button class="secondary" onclick="exportProgress()">导出记录</button><button class="secondary" onclick="document.getElementById('importFile').click()">导入记录</button><button class="secondary danger" onclick="resetProgress()">清空记录</button></div></section>`}
    function progressBar(name,s){return `<div class="bar-item"><b>${name}</b><div class="bar-bg"><i style="width:${s.pct}%"></i></div><em>${s.pct}%</em></div>`}
    function exportProgress(){const blob=new Blob([JSON.stringify({version:1,exportedAt:new Date().toISOString(),progress:saved.progress},null,2)],{type:'application/json'});const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='金属材料学刷题进度_'+new Date().toISOString().slice(0,10)+'.json';a.click();URL.revokeObjectURL(a.href);toast('记录已导出')}
    function importProgress(e){const f=e.target.files[0];if(!f)return;const r=new FileReader();r.onload=()=>{try{const x=JSON.parse(r.result);if(!x.progress)throw 0;saved.progress={...saved.progress,...x.progress};persist();render();toast('记录已导入')}catch(_){toast('记录文件无效')}};r.readAsText(f);e.target.value=''}
    function resetProgress(){if(confirm('确定清空全部学习记录？')){saved={progress:{}};persist();render();toast('记录已清空')}}
    render();
  </script>
</body>
</html>
